networks:
  biomasa:
    driver: bridge

volumes:
  pg_data:
  minio_data:

services:

  db:
    image: postgres:16-alpine
    container_name: biomasa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - biomasa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: biomasa_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - biomasa

  api:
    image: ghcr.io/masdelacruz/comsa-albaranes-biomasa:latest
    container_name: biomasa_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV:          production
      PORT:              3001
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      JWT_SECRET:        ${JWT_SECRET}
      MINIO_ENDPOINT:    minio
      MINIO_PORT:        9000
      MINIO_USE_SSL:     "false"
      MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:      documentos
      SMTP_HOST:         ${SMTP_HOST}
      SMTP_PORT:         ${SMTP_PORT}
      SMTP_USER:         ${SMTP_USER}
      SMTP_PASS:         ${SMTP_PASS}
      SMTP_FROM:         ${SMTP_FROM}
      APP_URL:           https://biomasa.cserintranet.com
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - biomasa
