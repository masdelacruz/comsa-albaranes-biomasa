# ─────────────────────────────────────────────────────────────────
# VirtualHost Apache — biomasa.cserintranet.com
# ─────────────────────────────────────────────────────────────────

# HTTP → redirige a HTTPS
<VirtualHost *:80>
    ServerName biomasa.cserintranet.com
    RewriteEngine On
    RewriteRule ^/?(.*) https://biomasa.cserintranet.com/$1 [R=301,L]
</VirtualHost>

# HTTPS
<VirtualHost *:443>
    ServerName biomasa.cserintranet.com

    SSLEngine on
    SSLCertificateFile    /usr/local/apache2/ssl/cserintranet.com.chain.pem
    SSLCertificateKeyFile /usr/local/apache2/ssl/cserintranet.com.priv

    ProxyPreserveHost On
    ProxyRequests     Off

    ProxyPass        / http://biomasa_api:3001/
    ProxyPassReverse / http://biomasa_api:3001/

    # Reenvía la IP real del cliente al backend
    RequestHeader set X-Real-IP          "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For    "%{REMOTE_ADDR}s"
    Header always set X-Forwarded-Proto  "https"
    Header always set X-Frame-Options    "SAMEORIGIN"

    ErrorLog  /usr/local/apache2/logs/biomasa_error.log
    CustomLog /usr/local/apache2/logs/biomasa_access.log combined
</VirtualHost>
