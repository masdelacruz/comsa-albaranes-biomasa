# ─────────────────────────────────────────────────────────────────
# VirtualHost Apache — biomasa.cserintranet.com
#
# Colocar en: /usr/local/app/apache2/conf/extra/biomasa.conf
# Añadir en httpd.conf (al final):
#   Include /usr/local/apache2/conf/extra/biomasa.conf
#
# Verificar sintaxis:  docker exec apache2 httpd -t
# Recargar sin cortar: docker exec apache2 httpd -k graceful
# ─────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════════
# FASE 1 — HTTP (usar ahora, mientras no hay certificado SSL)
# Accesible en: http://biomasa.cserintranet.com
# ══════════════════════════════════════════════════════════════════

<VirtualHost *:80>
    ServerName biomasa.cserintranet.com

    ProxyPreserveHost On
    ProxyRequests     Off

    ProxyPass        / http://localhost:8080/
    ProxyPassReverse / http://localhost:8080/

    # Reenvía la IP real del cliente al backend
    RequestHeader set X-Real-IP          "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-For    "%{REMOTE_ADDR}s"
    Header    always set X-Forwarded-Proto "http"

    ErrorLog  /usr/local/apache2/logs/biomasa_error.log
    CustomLog /usr/local/apache2/logs/biomasa_access.log combined
</VirtualHost>


# ══════════════════════════════════════════════════════════════════
# FASE 2 — HTTPS (descomentar cuando IT entregue el certificado)
